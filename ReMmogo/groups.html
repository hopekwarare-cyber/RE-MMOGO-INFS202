<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Re-Mmogo WebApp</h1>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="groups.html">Groups</a>
      <a href="members.html">Members</a>
      <a href="contributions.html">Contributions</a>
      <a href="loans.html">Loans</a>
      <a href="approvals.html">Approvals</a>
      <a href="reports.html">Reports</a>
    </nav>
  </header>

  <main>
  <section class="form-container">
    <h2>Register Motshelo Group</h2>
    <form>
      <label for="groupName">Group Name</label>
      <input type="text" id="groupName" required>

      <label for="description">Description</label>
      <textarea id="description"></textarea>

      <label for="monthlyContribution">Monthly Contribution (P)</label>
      <input type="number" id="monthlyContribution" value="1000" required>

      <label for="signatory1">Signatory 1 Name</label>
      <input type="text" id="signatory1" required>

      <label for="signatory2">Signatory 2 Name</label>
      <input type="text" id="signatory2" required>

      <button type="submit">Create Group</button>
    </form>
  </section>
</main>
